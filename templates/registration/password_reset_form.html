{% extends "base.html" %}
{% block title %}
    Local Library - Password Reset Form
{% endblock %}
{% block content %}
    <form action="" method="post">
    {% csrf_token %}
    {% if form.email.errors %}
        <div class="alert alert-danger" role="alert">
            {{ form.email.errors }}
        </div>
    {% endif %}
        <p>{{ form.email }}</p> 
        <input type="submit" class="btn btn-default btn-lg" value="Reset password">
    </form>
{% endblock %}
